# DocSeva – Render free deployment blueprint

services:
  - type: web
    name: docseva
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        sync: false

      - key: CSRF_TRUSTED_ORIGINS
        sync: false

      - key: PUBLIC_BASE_URL
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: docseva-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: docseva-redis
          property: connectionString

      - key: DATABASE_SSL_REQUIRE
        value: "True"

      - key: SECURE_SSL_REDIRECT
        value: "True"

      - key: USE_X_FORWARDED_HOST
        value: "True"

      - key: GUNICORN_WORKERS
        value: "1"

      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

      - key: DEFAULT_FROM_EMAIL
        value: DocSeva <noreply@docseva.local>

      - key: SERVER_EMAIL
        value: DocSeva <noreply@docseva.local>

      - key: GOV_API_MODE
        value: mock

      - key: RATELIMIT_ENABLE
        value: "True"

  - type: redis
    name: docseva-redis
    plan: free
    ipAllowList: []

databases:
  - name: docseva-db
    databaseName: docseva
    user: docseva
    plan: free
